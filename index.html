<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Form | Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <div class="form-header">
                <h1>Create Account</h1>
                <p>Join us today and start your journey</p>
            </div>
            
            <form id="myForm">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <div class="input-field">
                        <input type="text" id="name" name="name" placeholder="Enter your full name" autocomplete="off">
                        <span class="input-icon">👤</span>
                    </div>
                    <span class="error-message" id="nameError"></span>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-field">
                        <input type="email" id="email" name="email" placeholder="Enter your email" autocomplete="off">
                        <span class="input-icon">📧</span>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-field">
                        <input type="password" id="password" name="password" placeholder="Create a password">
                        <span class="input-icon">🔒</span>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                    <div class="password-hint">Minimum 6 characters</div>
                </div>

                <button type="submit" class="submit-btn">
                    <span>Sign Up</span>
                    <span class="btn-icon">→</span>
                </button>

                <div class="form-footer">
                    <p>Already have an account? <a href="#">Sign In</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Popup Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="success-icon">✓</div>
                <h2>Success!</h2>
            </div>
            <div class="modal-body">
                <p>Your account has been created successfully!</p>
                <p class="modal-message">Welcome aboard! 🎉</p>
            </div>
            <button class="modal-btn" onclick="closeModal()">Continue</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
